<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>中共党史刷题</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div class="appbar-title" id="viewTitle">题库挑战</div>
      <div class="appbar-sub" id="progressSub">0/0</div>
    </header>

    <main class="stage">
      <article id="card" class="card" aria-live="polite"><!-- 动态注入 --></article>

      <div id="settingsView" class="settings hidden">
        <div class="set-group">
          <span class="set-label">刷题模式</span>
          <div class="set-row">
            <button id="modeRand" class="chip active">随机</button>
            <button id="modeSeq" class="chip">顺序</button>
          </div>
        </div>
        <div class="set-group">
          <span class="set-label">错题答对几次后移出错题本</span>
          <div class="set-row">
            <button id="thMinus" class="btn-ghost step">−</button>
            <span id="thValue" class="th-value">2</span>
            <button id="thPlus" class="btn-ghost step">+</button>
          </div>
        </div>
        <div class="set-group">
          <span class="set-label">题型筛选</span>
          <select id="typeFilter" class="select">
            <option value="all">全部题型</option>
            <option value="single">单选题</option>
            <option value="multiple">多选题</option>
            <option value="judge">判断题</option>
            <option value="blank">填空题</option>
          </select>
        </div>
        <div class="set-group">
          <span class="set-label">跳转到题号</span>
          <div class="set-row">
            <input id="jumpInput" class="jump-input" type="number" min="1" inputmode="numeric" aria-label="题号">
            <button id="jumpBtn" class="btn-ghost">跳转</button>
          </div>
        </div>
        <div class="set-group">
          <span class="set-label">数据</span>
          <div class="set-row">
            <button id="resetBtn" class="btn-ghost danger">重置全部进度与错题</button>
          </div>
        </div>
        <p class="set-meta" id="metaInfo">题库加载中…</p>
        <p class="set-meta">答题进度仅存于本机浏览器，不上传。</p>
      </div>
    </main>

    <div class="navrow" id="navrow">
      <button id="prevBtn" class="nav-btn">‹ 上一题</button>
      <span id="navIndex" class="nav-index">0/0</span>
      <button id="nextBtn" class="nav-btn">下一题 ›</button>
    </div>

    <nav class="tabbar" role="tablist">
      <button class="tabitem active" data-view="practice" role="tab">
        <span class="ti-ico">📖</span><span class="ti-txt">题库</span>
      </button>
      <button class="tabitem" data-view="wrong" role="tab">
        <span class="ti-ico">🔥</span><span class="ti-txt">错题本</span><i id="wrongCount" class="ti-badge">0</i>
      </button>
      <button class="tabitem" data-view="settings" role="tab">
        <span class="ti-ico">⚙️</span><span class="ti-txt">设置</span>
      </button>
    </nav>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
